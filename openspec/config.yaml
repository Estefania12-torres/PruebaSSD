schema: spec-driven

# =============================================================================
# Project: AI SQL Dashboard — NL2SQL Multi-Agent Architecture
# Versión actualizada en base a: BACKEND_SPECS.md, FRONTEND_SPECS.md,
#                                N8N_SPECS.md, RAG_SPECS.md
# Última revisión: 2026-06-21
# =============================================================================

context: |
  AI SQL Dashboard — NL2SQL Agent System:
  Sistema Multiagente basado en LLMs, RAG local y n8n para la Generación
  Segura de Consultas SQL a partir de Lenguaje Natural en Bases de Datos
  Relacionales. Sin capa de anonimización — los datos se procesan directamente
  de forma segura dentro del backend local.

  Dominio:
  - Interfaz web (SPA) diseñada con Stitch para usuarios técnicos y no técnicos
    que necesitan consultar bases de datos relacionales sin escribir SQL.
  - Gestión de cadena de conexión persistente en el cliente (localStorage) con
    validación de formato DSN, enmascarado visual y controles de edición/eliminación.
  - Pipeline RAG embebido en Node.js puro (@xenova/transformers + similitud de
    coseno) que indexa el esquema de la BD, persiste índices vectoriales en JSON
    local (data/rag/) y recupera solo las tablas relevantes para cada consulta.
  - Orquestación Multi-Agente sincrónica en n8n (3 agentes especializados):
      1. Agente de Contexto (Context Agent — Gemini 3.1 Flash Lite)
      2. Agente Razonador y Generador SQL (Qwen 3 32B vía Groq)
      3. Agente de Seguridad y Validación (Defog gpt-oss-120b vía Groq)
  - Generación automatizada de consultas SQL de solo lectura (SELECT) con
    cláusula de seguridad LIMIT 100 inyectada en todo momento.
  - Doble auditoría de seguridad: validación dura en JavaScript (Code nodes n8n)
    + validación semántica por el Agente de Seguridad especializado.
  - Ejecución de la query final en el backend local (nunca en n8n ni en LLMs),
    formateo de resultados en Markdown y relleno de plantilla mediante
    FormatterService.

  Principio de Seguridad Crítico (Zero-Trust):
  - LOS DATOS REALES DE LAS BASES DE DATOS JAMÁS SE EXPONEN A LOS MODELOS DE IA.
    Los LLMs externos solo operan con metadatos estructurales filtrados por el RAG
    (nombres de tablas y columnas relevantes). La ejecución de la query final y el
    formateo de resultados se realizan exclusivamente dentro del backend Node.js.
  - Sin capa de anonimización: el esquema de metadatos filtrado por RAG es el
    único dato estructural que sale hacia n8n. Los datos de negocio nunca viajan
    fuera del backend local.

  Arquitectura General:
  - Backend:  Arquitectura Hexagonal (Puertos y Adaptadores) — Node.js + Express.
              Ubicación: back/ (raíz del proyecto separada del frontend).
  - Frontend: SPA estática — HTML5 + Tailwind CSS + JavaScript Vanilla (ES6+).
              Diseño visual generado con Stitch (sistema "Syntactic Dark").
              Ubicación: front/
  - RAG:      Motor embebido en el backend con @xenova/transformers.
              Índices vectoriales persistidos en back/data/rag/*.json.
  - IA/Orquestación: Flujo n8n sincrónico de 11 nodos y 3 agentes especializados.

  Backend Stack:
  - Runtime:        Node.js v18.x o superior
  - Framework:      Express.js — exposición de endpoints HTTP (In Adapters)
  - Query Builder:  Knex.js — conectividad dinámica multi-motor (Out Adapters)
  - RAG Engine:     @xenova/transformers (all-MiniLM-L6-v2) + similitud de coseno
  - Cliente HTTP:   Axios — invocación del Webhook de n8n
  - Variables env:  dotenvx (.env + .env.local)
  - Estructura:     back/src/core/  back/src/adapters/  back/config/  back/data/rag/

  Frontend Stack:
  - Diseño visual:  Stitch (Design System: "Syntactic Dark")
  - Lenguaje:       JavaScript Vanilla ES6+
  - Maquetación:    HTML5 + Tailwind CSS (CDN)
  - Fuentes:        Inter (UI) + JetBrains Mono (código/SQL)
  - Seguridad UI:   Validadores anti-inyección, textContent sobre innerHTML,
                    conexión DB almacenada en localStorage enmascarada
  - Estructura:     front/index.html  front/css/styles.css  front/js/app.js

  IA & Automatización Stack (n8n):
  - Servidor:       n8n v2.8.x (Self-Hosted, local)
  - Webhook URL:    http://localhost:5678/webhook/nl2sql-3-agents
  - Workflow ID:    uGIDY4qm3Tgn6yhF
  - Nodos totales:  11 nodos / 3 agentes
  - Agente 1:       Context Agent — Gemini 3.1 Flash Lite (Google)
                    → Genera query SQL de extracción de metadatos por motor
  - Agente 2:       Razonador y Generador SQL — Qwen 3 32B (vía Groq)
                    → Analiza pregunta + esquema RAG → genera SQL + template
  - Agente 3:       Seguridad y Validación — Defog gpt-oss-120b (vía Groq)
                    → Audita SQL contra inyecciones y comandos destructivos
  - Code Nodes JS:  Detect Engine, Clear Schema Query, Parser Agente 2,
                    Code in JavaScript, Security Parser

  Bases de Datos Compatibles (Soporte Nativo vía Knex.js):
  - PostgreSQL, MySQL / MariaDB, SQLite, Oracle, SQL Server (MSSQL)
  - Detección automática del motor por prefijo del connection string

  Endpoints API REST (Backend Express):
  - POST /api/v1/ask     → Inicia el pipeline NL2SQL (Frontend → Backend → n8n)
    Payload:  { connection_string, question }
    Response: { status: "cod_ok", data: { answer, raw_data }, message }
  - POST /api/execute    → Ejecuta SQL + rellena template (n8n → Backend → BD)
    Payload:  { connection_string, sql, llm_template }
    Response: { status: "cod_ok", data: { answer, raw_data }, message }
  - POST /api/query      → Ejecuta SQL crudo y retorna JSON (n8n → Backend → BD)
    Payload:  { connection_string, sql }
    Response: { status: "cod_ok", data: [...rows], message }

  Formato de Errores Estándar:
    { status: "cod_error", error_code: "...", detail: "...", message: "..." }

  Reglas de Desarrollo:
  - Arquitectura Hexagonal estricta: src/core/domain, src/core/useCases,
    src/core/ports, src/adapters separados y desacoplados.
  - Toda consulta generada por IA finaliza obligatoriamente con LIMIT 100.
  - Sin anonimización: el RAG actúa como filtro estructural del contexto.
  - Principios SOLID, DRY, Clean Code aplicados en todo el código.
  - Manejo robusto de errores y excepciones en todos los adaptadores.
  - Validación de datos en frontend (anti-XSS, anti-SQLi directo) y backend
    (dominio AskModel.validate()).
  - API RESTful con versionado (/api/v1/), verbos HTTP correctos y códigos
    de estado HTTP semánticos.
  - Tests unitarios parametrizados para Knex.js con SQLite/PostgreSQL.
  - Seguridad OWASP Top 10 priorizada en todas las capas.
  - Commits con convención Conventional Commits.

  Documentación:
  - Arquitectura documentada con C4 Model (Context, Container, Component).
  - API RESTful documentada con Swagger/OpenAPI.
  - ADRs (Architecture Decision Records) para decisiones clave.

  PROCESO SDD OBLIGATORIO:
  1. No generar spec.md sin aprobación explícita del proposal.
  2. No generar design.md sin aprobación explícita del spec.
  3. No generar tasks.md sin aprobación explícita del design.
  4. Detenerse después de cada artefacto y solicitar validación del usuario.

rules:
  proposal:
    - Preguntar sobre el motor de base de datos objetivo antes de generar el proposal.
    - Incluir sección "Security Boundaries" que explique qué datos NO se exponen a LLMs.
    - Mencionar explícitamente que no hay capa de anonimización y que el RAG es el filtro.
    - Mantener proposals bajo 600 palabras.

  specs:
    - Usar gherkin-authoring skill para criterios de aceptación de intenciones del usuario.
    - Mapear edge cases de lenguaje natural (ej. "dame los totales de este mes").
    - Incluir validaciones de seguridad en el frontend (DSN format, SQL keyword detection).
    - Especificar el flujo de la cadena de conexión: localStorage → payload → backend → n8n.

  design:
    - Usar c4-architecture skill para mapear interacciones entre Express controllers,
      Core Use Cases, RAG Engine, y n8n Webhooks.
    - Incluir diagrama ASCII del árbol de directorios Hexagonal (back/ y front/).
    - Documentar el flujo completo: Frontend → /api/v1/ask → n8n → /api/query →
      /api/execute → respuesta formateada.
    - Especificar el sistema de diseño Stitch "Syntactic Dark" para el frontend.

  tasks:
    - Descomponer en tareas de máximo 45 minutos de implementación.
    - Separar explícitamente tareas de Node.js (Core/Adapters) y configuraciones n8n.
    - Incluir tareas de construcción y consulta del índice RAG local.
    - Incluir tareas de pruebas unitarias parametrizadas con SQLite/PostgreSQL.
    - Verificar que ninguna tarea exponga variables de conexión hacia flujos externos.
    - Incluir tareas de validación del diseño en Stitch antes de codificar el frontend.